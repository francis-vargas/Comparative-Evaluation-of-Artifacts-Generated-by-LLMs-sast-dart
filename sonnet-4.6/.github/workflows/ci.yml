name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dart_sast (with dev dependencies)
        run: pip install -e ".[dev]"

      - name: Run test suite
        run: pytest -q --cov=dart_sast --cov-report=term-missing

      - name: Smoke-test the CLI against the bundled example app
        run: dart_sast examples/vulnerable_app --format sarif --output report.sarif --fail-on never

      - name: Upload SARIF (self-scan artifact)
        uses: actions/upload-artifact@v4
        with:
          name: dart_sast-example-report-${{ matrix.python-version }}
          path: report.sarif
