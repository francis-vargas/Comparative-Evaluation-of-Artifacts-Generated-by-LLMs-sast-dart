name: dart_sast CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies and dart_sast
      run: |
        python -m pip install --upgrade pip
        pip install .

    - name: Run automated test suite
      run: |
        python -m unittest discover -s tests -p "test_*.py"

    - name: Run Self-Scan check
      run: |
        dart_sast tests/vulnerable_example.dart || true
